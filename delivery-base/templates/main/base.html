<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Delivery UVV{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    {% block css %}{% endblock %}
    {% endblock %}
</head>
<body>
    <header>
            {% block navbar %}
            {% include 'main/partials/navbar.html' %}
            {% endblock %}
    </header>
    
    <section class="section">
        <div class="container">
            {% block content %}

            {% endblock %}
        </div>
    </section>

    <footer class="footer">
        <div class="content has-text-centered">
        {% block footer %}
            {% include 'main/partials/footer.html' %}
        {% endblock %}
        </div>
    </footer>
</body>
</html>
