{% macro item_carrinho(item) %}
<li>
    <div class="box is-flex is-justify-content-space-between is-align-items-center p-5 mb-4">
        <div>
        <h3 class="title is-5 mb-2">{{ item.name }}</h3>
        <p class="has-text-gray">Quantidade: <strong>{{ item.quantidade }}</strong> x R$ {{ item.preco | round(2) }}</p>
        </div>
    
    <div class="preco has-text-right">
        <p class="title is-5 has-text-sucess has-text-weight-bold mb-0">
            R$ {{ (item.preco * item.quantidade) | round(2) }}
        </p>
    </div>
    </div>
</li>
{% endmacro %}
