{% if articles %}
<div class="columns is-multiline">
    {% for article in articles %}
    <div class="column is-one-third-desktop is-half-tablet">
        <a class="card article-card" href="{{ url_for('main.news_detail', article_id=article.id) }}">
            <div class="card-content">
                <p class="title is-5">{{ article.title }}</p>
                <p class="subtitle is-6">{{ article.source_name }}</p>
                    <time datetime="{{ article.published_at.isoformat() }}">
                        {{ article.published_at.strftime("%d/%m/%Y") }}
                    </time>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="notification is-warning is-light">
    Nenhuma noticia coletada ainda. Execute <code>flask scrape-news</code> para popular o banco.
</div>
{% endif %}
